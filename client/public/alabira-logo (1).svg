<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 76" role="img" aria-label="ALABIRA Global Farm Tilde">
  <title>ALABIRA — Global Farm Tilde</title>

  <defs>
    <style><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=Outfit:wght@400&display=swap');
    ]]></style>
  </defs>

  <!-- ── Botanical A Mark (42×60 @ origin 0,8) ── -->
  <svg x="0" y="8" width="42" height="60" viewBox="0 0 70 100">

    <!-- Wheat grains -->
    <ellipse cx="35" cy="8"  rx="3.5" ry="6"   fill="#C9922B"/>
    <ellipse cx="27" cy="13" rx="3"   ry="5.5" fill="#C9922B" transform="rotate(-22 27 13)"/>
    <ellipse cx="43" cy="13" rx="3"   ry="5.5" fill="#C9922B" transform="rotate(22 43 13)"/>

    <!-- Wheat stems -->
    <line x1="35" y1="16" x2="35"   y2="11" stroke="#C9922B" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="35" y1="16" x2="27.5" y2="15" stroke="#C9922B" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="35" y1="16" x2="42.5" y2="15" stroke="#C9922B" stroke-width="1.2" stroke-linecap="round"/>

    <!-- A left leg (organic curve) -->
    <path d="M35,16 C30,36 16,55 5,84"  fill="none" stroke="#0F2B1A" stroke-width="4.5" stroke-linecap="round"/>
    <!-- A right leg (organic curve) -->
    <path d="M35,16 C40,36 54,55 65,84" fill="none" stroke="#0F2B1A" stroke-width="4.5" stroke-linecap="round"/>

    <!-- Crossbar (arched horizon) -->
    <path d="M21,50 Q35,45 49,50" fill="none" stroke="#0F2B1A" stroke-width="3" stroke-linecap="round"/>

    <!-- Earth arc (globe curvature) -->
    <path d="M2,84 Q35,92 68,84" fill="none" stroke="#0F2B1A" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Roots -->
    <line x1="5"  y1="84" x2="1"  y2="96" stroke="#0F2B1A" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <line x1="35" y1="92" x2="35" y2="98" stroke="#0F2B1A" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <line x1="65" y1="84" x2="69" y2="96" stroke="#0F2B1A" stroke-width="2" stroke-linecap="round" opacity="0.5"/>

  </svg>

  <!-- ── Divider ── -->
  <line x1="51" y1="14" x2="51" y2="64"
        stroke="#0F2B1A" stroke-width="0.5" opacity="0.18"/>

  <!-- ── Wordmark ── -->
  <text x="61" y="48"
        font-family="'Cormorant Garamond', Georgia, 'Times New Roman', serif"
        font-size="46"
        font-weight="700"
        letter-spacing="8"
        fill="#0F2B1A">ALABIRA</text>

  <!-- ── Tagline ── -->
  <text x="63" y="63"
        font-family="'Outfit', 'Helvetica Neue', Arial, sans-serif"
        font-size="9"
        font-weight="400"
        letter-spacing="3.5"
        fill="#C9922B">GLOBAL FARM TILDE</text>

</svg>
