<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="ALABIRA">
  <title>ALABIRA</title>

  <!-- ── Background ── -->
  <rect width="32" height="32" rx="6" fill="#0F2B1A"/>

  <!-- ── Subtle concentric ring (globe) ── -->
  <circle cx="16" cy="16" r="13"
          fill="none" stroke="#C9922B" stroke-width="0.4" opacity="0.25"/>

  <!-- ── Wheat grain (single, apex) ── -->
  <ellipse cx="16" cy="4.5" rx="2.2" ry="3.5" fill="#C9922B"/>

  <!-- ── Wheat stem ── -->
  <line x1="16" y1="8" x2="16" y2="6.5"
        stroke="#C9922B" stroke-width="1" stroke-linecap="round"/>

  <!-- ── A left leg ── -->
  <path d="M16,8 C13.5,15 9.5,21 6.5,28"
        fill="none" stroke="#E8DCC8" stroke-width="2.6" stroke-linecap="round"/>

  <!-- ── A right leg ── -->
  <path d="M16,8 C18.5,15 22.5,21 25.5,28"
        fill="none" stroke="#E8DCC8" stroke-width="2.6" stroke-linecap="round"/>

  <!-- ── Crossbar (arched) ── -->
  <path d="M10.5,20.5 Q16,18.5 21.5,20.5"
        fill="none" stroke="#E8DCC8" stroke-width="1.9" stroke-linecap="round"/>

  <!-- ── Earth arc ── -->
  <path d="M5.5,28 Q16,31 26.5,28"
        fill="none" stroke="#E8DCC8" stroke-width="1" stroke-linecap="round" opacity="0.45"/>

</svg>
